general {
    hide_cursor = true
    ignore_empty_input = true
    fail_timeout = 1000
}

background {
    monitor =
    path = screenshot
    color = rgba(18, 18, 24, 1.0)
    blur_passes = 4
}

input-field {
    monitor =

    size = 11.25%, 20%
    position = 0, -20
    halign = center
    valign = center

    rounding = -1
    outline_thickness = 7

    hide_input = true
    placeholder_text = 
    fail_text = WRONG!

    inner_color = rgba(00000000)
    outer_color = rgba(5294e3ff)
    check_color = rgba(00ff99ff)
    fail_color  = rgba(ee4b2bff)
}
